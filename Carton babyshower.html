<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cartón Baby Shower</title>
  <style>
    :root {
      --bg: #f1f7ff;
      --card: rgba(255,255,255,0.95);
      --border: rgba(148, 177, 236, 0.45);
      --text: #3d3f65;
      --accent: #5173cd;
      --cell: #f6f7ff;
      --cell-border: rgba(167, 191, 232, 0.45);
      --free: #d4dff9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', Arial, sans-serif;
      background: radial-gradient(circle at top left, #e7f0ff 0%, #eef7ff 35%, #f9fcff 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 28px 18px 32px;
    }

    .page {
      width: min(1000px, 100%);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
      color: #3f446a;
    }

    .header .subtitle {
      margin: 16px auto 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      background: #d9e5ff;
      color: #4b5f8e;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(146, 169, 215, 0.15);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 30px;
      box-shadow: 0 32px 60px rgba(142, 161, 205, 0.16);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .cell {
      background: var(--cell);
      border: 1px solid var(--cell-border);
      border-radius: 22px;
      min-height: 96px;
      padding: 14px 10px;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 0.95rem;
      color: #41476b;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
    }

    .cell:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(145, 168, 206, 0.18);
    }

    .cell.marked {
      background: #d5defc;
      border-color: rgba(81, 115, 205, 0.45);
      color: #3f588b;
    }

    .cell.free {
      background: var(--free);
      color: #3d57a5;
      border-color: rgba(81, 115, 205, 0.35);
      font-size: 1.6rem;
      cursor: default;
    }

    .button-wrap {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #8fa4f3 0%, #b4cdf5 100%);
      color: #384874;
      font-weight: 700;
      padding: 14px 28px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 16px 32px rgba(143, 166, 217, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 30px rgba(143, 166, 217, 0.28);
    }

    @media (max-width: 720px) {
      .grid {
        gap: 10px;
      }

      .cell {
        min-height: 80px;
        padding: 12px 8px;
      }
    }

    @media (max-width: 520px) {
      .header .subtitle {
        width: fit-content;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Tu cartón</h1>
      <div class="subtitle">¡Baby Shower Bingo!</div>
    </header>

    <section class="card">
      <div class="grid" id="grid"></div>
      <div class="button-wrap">
        <button onclick="verificar()">Cantar BINGO</button>
      </div>
    </section>
  </div>

  <script>
    const palabras = [
      "Pañal","Biberón","Chupete","Coche","Cuna","Mamadera",
      "Babero","Toallitas","Juguete","Pijama","Sonajero",
      "Manta","Leche","Dormir","Llanto","Paseo",
      "Gatear","Carriola","Termómetro","Bañera",
      "Crema","Talco","Ropita","Calcetines","Cambiar",
      "Gateo","Sonrisa","Cuento","Peluche","Móvil","Mecer",
      "Arrullo","Frazada","Tetero","Cochecito","Guardería",
      "Primeros pasos","Dientes","Risa","Abrazos","Cariño",
      "Chiquito","Familia","Cuidado","Nama","Bebé",
      "Ternura","Alegría","Duermes","Llora","Arrullos",
      "Papilla","Comida","Agüita","Jabón","Baño",
      "Sueño","Descanso","Balancín","Luces","Música"
    ];

    let carton = [];
    let marcados = ["FREE"];

    function generar() {
      carton = [...palabras].sort(() => 0.5 - Math.random()).slice(0, 25);
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      carton.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "cell";

        if (i === 12) {
          div.classList.add("free");
          div.innerText = "❤";
        } else {
          div.innerText = p;
          div.onclick = () => {
            div.classList.toggle("marked");
            if (marcados.includes(p)) {
              marcados = marcados.filter(x => x !== p);
            } else {
              marcados.push(p);
            }
          };
        }

        grid.appendChild(div);
      });
    }

    function verificar() {
      const markedSet = new Set(marcados);
      const lines = [];

      for (let i = 0; i < 5; i++) {
        lines.push(carton.slice(i * 5, i * 5 + 5));
      }

      for (let i = 0; i < 5; i++) {
        lines.push([carton[i], carton[i + 5], carton[i + 10], carton[i + 15], carton[i + 20]]);
      }

      lines.push([carton[0], carton[6], "FREE", carton[18], carton[24]]);
      lines.push([carton[4], carton[8], "FREE", carton[16], carton[20]]);

      const gano = lines.some(line => line.every(item => markedSet.has(item)));

      if (gano) {
        alert("🎉 ¡BINGO! 🎉");
      } else {
        alert("Aún no tienes bingo 😅");
      }
    }

    generar();
  </script>
</body>
</html>
